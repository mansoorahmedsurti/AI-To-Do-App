apiVersion: dapr.io/v1alpha1
kind: Configuration
metadata:
  name: appconfig
spec:
  tracing:
    samplingRate: "1"
    zipkin:
      endpointAddress: "http://zipkin:9411/api/v2/spans"
  metric:
    enabled: true
  secrets:
    scopes:
      - storeName: kubernetes
        defaultAccess: allow
  httpPipeline:
    handlers:
      - name: cors
        type: middleware.http.cors
        version: v1
        metadata:
          - name: allowedOrigins
            value: "*"
          - name: allowedHeaders
            value: "Content-Type,Authorization"
